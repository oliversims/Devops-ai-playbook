# -------------------------------------------------------
# GITHUB ACTIONS WORKFLOW: Boutique CI Pipeline
# -------------------------------------------------------
# This pipeline builds Docker images for all microservices,
# pushes them to AWS ECR, then updates the Kubernetes manifests
# with the new image tags (GitOps pattern).
name: Boutique CI Pipeline

# -------------------------------------------------------
# TRIGGER: Automatic on push to main + Manual trigger
# -------------------------------------------------------
# Automatically triggers on push to main branch,
# and can also be manually triggered via GitHub Actions UI.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# -------------------------------------------------------
# ENVIRONMENT VARIABLES: Shared across all jobs and steps
# -------------------------------------------------------
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}  # AWS region pulled from GitHub secrets
  IMAGE_TAG: ${{ github.sha }}           # Use the full Git commit SHA as the image tag
                                         # This makes every build uniquely traceable to a commit

# -------------------------------------------------------
# JOB 1: Build and push Docker images for all services
# -------------------------------------------------------
jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Run on a fresh Ubuntu runner

    # -------------------------------------------------------
    # MATRIX STRATEGY: Run this job in parallel for each service
    # -------------------------------------------------------
    # Instead of writing separate jobs for each service,
    # the matrix automatically runs one job per service simultaneously.
    # GitHub Actions will spin up 7 parallel runners — one per service.
    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      # STEP 1: Pull the repo code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Authenticate to AWS using stored access key secrets.
      # NOTE: This uses long-lived AWS access keys stored as GitHub secrets.
      # (Less secure than OIDC — consider switching to OIDC for production)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # STEP 3: Log Docker into Amazon ECR
      # Gets a temporary ECR password from AWS CLI and pipes it directly
      # into docker login — no password is stored anywhere.
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      # STEP 4: Build the Docker image for the current matrix service
      # The frontend has its own folder path, so we handle it separately.
      # All backend services follow a consistent folder structure.
      # The image is tagged with the Git commit SHA for traceability.
      - name: Build Docker Image
        run: |
          # Set the build path based on whether this is frontend or a backend service
          if [ "${{ matrix.service }}" == "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          echo "Building from $BUILD_PATH"

          # Build and tag the image with the full ECR URI + commit SHA tag
          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG \
          $BUILD_PATH

      # STEP 5: Push the built image to ECR
      # Constructs the full ECR image URI and pushes it.
      - name: Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ matrix.service }}:${{ github.sha }}
          echo "Pushing $IMAGE_URI"
          docker push $IMAGE_URI

  # -------------------------------------------------------
  # JOB 2: Update Kubernetes manifests with new image tags
  # -------------------------------------------------------
  # This job runs AFTER all build-and-push jobs complete (needs: build-and-push).
  # It updates the image tags in the K8s YAML files so the cluster
  # knows to pull the newly built images — this is the GitOps pattern.
  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push  # Wait for ALL matrix build jobs to finish before running this
    permissions:
      contents: write  # Needed to commit and push changes back to the repo

    steps:
      # STEP 1: Checkout the repo with write access using GITHUB_TOKEN
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Allows pushing commits back to the repo

      # STEP 2: Update the image tag in each Kubernetes manifest file
      # Uses sed to find the old image URI line and replace it with the new SHA tag.
      # Loops through all backend services, then handles frontend separately.
      - name: Update image tags in k8s manifests
        run: |
          NEW_TAG=${{ github.sha }}             # The new image tag (commit SHA)
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }} # AWS account ID
          REGION=${{ secrets.AWS_REGION }}      # AWS region

          # Loop through each backend service and update its manifest
          for SERVICE in auth gateway orders order-service product-service user-service; do
            MANIFEST="gitops/k8s/backend/${SERVICE}.yml"
            # Replace whatever tag is currently in the file with the new SHA tag
            sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${NEW_TAG}|g" $MANIFEST
          done

          # Update the frontend deployment manifest separately (different folder path)
          sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/frontend:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/frontend:${NEW_TAG}|g" gitops/k8s/frontend/deployment.yml

      # STEP 3: Commit and push the updated manifest files back to the repo
      # "git diff --staged --quiet" checks if anything actually changed.
      # If nothing changed (tags were already up to date), it skips the commit.
      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/                          # Stage all updated manifest files
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"  # Only commit if there are changes
          git push                                      # Push the commit back to the repo