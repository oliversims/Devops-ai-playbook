# Builds Docker images, pushes to ECR, and updates GitOps manifests.
#
# Push to main -> builds ONLY services whose files changed
# Manual run -> pick "all" or ONE service from the dropdown
name: Boutique CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'projects/boutique-microservices/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      service:
        description: Service to build
        required: true
        default: all
        type: choice
        options:
          - all
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Figure out which services to build (changed paths on push, or manual choice).
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Detect changed services
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'projects/boutique-microservices/backend/services/auth/**'
            gateway:
              - 'projects/boutique-microservices/backend/services/gateway/**'
            orders:
              - 'projects/boutique-microservices/backend/services/orders/**'
            order-service:
              - 'projects/boutique-microservices/backend/services/order-service/**'
            product-service:
              - 'projects/boutique-microservices/backend/services/product-service/**'
            user-service:
              - 'projects/boutique-microservices/backend/services/user-service/**'
            frontend:
              - 'projects/boutique-microservices/frontend/**'
            workflow:
              - '.github/workflows/ci.yml'

      - name: Set build matrix
        id: set-matrix
        run: |
          # Build a space-separated list, then convert to JSON with jq.
          # Use GITHUB_OUTPUT heredoc so quotes are not stripped between jobs.
          SERVICES=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.service }}" = "all" ]; then
              SERVICES="auth gateway orders order-service product-service user-service frontend"
            else
              SERVICES="${{ github.event.inputs.service }}"
            fi
          elif [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            SERVICES="auth gateway orders order-service product-service user-service frontend"
          else
            [ "${{ steps.filter.outputs.auth }}" = "true" ] && SERVICES="$SERVICES auth"
            [ "${{ steps.filter.outputs.gateway }}" = "true" ] && SERVICES="$SERVICES gateway"
            [ "${{ steps.filter.outputs.orders }}" = "true" ] && SERVICES="$SERVICES orders"
            [ "${{ steps.filter.outputs.order-service }}" = "true" ] && SERVICES="$SERVICES order-service"
            [ "${{ steps.filter.outputs.product-service }}" = "true" ] && SERVICES="$SERVICES product-service"
            [ "${{ steps.filter.outputs.user-service }}" = "true" ] && SERVICES="$SERVICES user-service"
            [ "${{ steps.filter.outputs.frontend }}" = "true" ] && SERVICES="$SERVICES frontend"
          fi

          JSON=$(echo $SERVICES | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s -c .)
          echo "Services to build: $JSON"
          {
            echo 'matrix<<EOF'
            echo "$JSON"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    strategy:
      matrix:
        service: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build and Push Docker Image
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG

          echo "Building $IMAGE_URI from $BUILD_PATH"
          docker build -t $IMAGE_URI $BUILD_PATH
          docker push $IMAGE_URI

  update-manifests:
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.matrix != '[]'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update image tags for changed services
        run: |
          NEW_TAG=${{ github.sha }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}

          for SERVICE in $(echo '${{ needs.setup.outputs.matrix }}' | jq -r '.[]'); do
            if [ "$SERVICE" = "frontend" ]; then
              MANIFEST="gitops/k8s/frontend/deployment.yml"
            else
              MANIFEST="gitops/k8s/backend/${SERVICE}.yml"
            fi
            sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${NEW_TAG}|g" $MANIFEST
            echo "Updated $MANIFEST"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
