# Builds Docker images, pushes to ECR, and updates GitOps manifests.
#
# Push to main  -> builds ONLY services whose files changed
# Manual run    -> pick "all" or ONE service from the dropdown
name: Boutique CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'projects/boutique-microservices/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      service:
        description: Service to build
        required: true
        default: all
        type: choice
        options:
          - all
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Step A — decide which services to build
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.manual-all.outputs.matrix || steps.manual-one.outputs.matrix || steps.push-all.outputs.matrix || steps.push-changed.outputs.matrix || '[]' }}
    steps:
      - name: Checkout code
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Detect changed folders
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'projects/boutique-microservices/backend/services/auth/**'
            gateway:
              - 'projects/boutique-microservices/backend/services/gateway/**'
            orders:
              - 'projects/boutique-microservices/backend/services/orders/**'
            order-service:
              - 'projects/boutique-microservices/backend/services/order-service/**'
            product-service:
              - 'projects/boutique-microservices/backend/services/product-service/**'
            user-service:
              - 'projects/boutique-microservices/backend/services/user-service/**'
            frontend:
              - 'projects/boutique-microservices/frontend/**'
            workflow:
              - '.github/workflows/ci.yml'

      # Manual run — user chose "all"
      - name: Manual run — build all services
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.service == 'all'
        id: manual-all
        run: |
          {
            echo 'matrix<<EOF'
            echo '["auth","gateway","orders","order-service","product-service","user-service","frontend"]'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # Manual run — user chose one service
      - name: Manual run — build one service
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.service != 'all'
        id: manual-one
        run: |
          {
            echo 'matrix<<EOF'
            echo '["${{ github.event.inputs.service }}"]'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # Push — ci.yml changed, rebuild everything
      - name: Push — workflow file changed, build all
        if: github.event_name == 'push' && steps.filter.outputs.workflow == 'true'
        id: push-all
        run: |
          {
            echo 'matrix<<EOF'
            echo '["auth","gateway","orders","order-service","product-service","user-service","frontend"]'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # Push — only service folders changed
      - name: Push — build changed services only
        if: github.event_name == 'push' && steps.filter.outputs.workflow != 'true'
        id: push-changed
        env:
          CHANGED: ${{ steps.filter.outputs.changes }}
        run: |
          JSON=$(echo "$CHANGED" | jq 'map(select(. != "workflow"))')
          echo "Services to build: $JSON"
          {
            echo 'matrix<<EOF'
            echo "$JSON"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

  # Step B — build and push Docker images to ECR
  build:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    strategy:
      matrix:
        service: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build and push image
        run: |
          SERVICE="${{ matrix.service }}"
          BUILD_PATH="projects/boutique-microservices/backend/services/$SERVICE"
          test "$SERVICE" = "frontend" && BUILD_PATH="projects/boutique-microservices/frontend"

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE:$IMAGE_TAG

          echo "Building $IMAGE_URI from $BUILD_PATH"
          if [ "$SERVICE" = "frontend" ]; then
            docker build --build-arg REACT_APP_API_URL=/api -t $IMAGE_URI $BUILD_PATH
          else
            docker build -t $IMAGE_URI $BUILD_PATH
          fi
          docker push $IMAGE_URI

  # Step C — update GitOps manifests for the services that were built
  update-manifests:
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.matrix != '[]'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tags
        env:
          MATRIX: ${{ needs.setup.outputs.matrix }}
        run: |
          NEW_TAG=${{ github.sha }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}

          for SERVICE in $(echo "$MATRIX" | jq -r '.[]'); do
            MANIFEST="gitops/k8s/backend/$SERVICE.yml"
            test "$SERVICE" = "frontend" && MANIFEST="gitops/k8s/frontend/deployment.yml"
            sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${NEW_TAG}|g" $MANIFEST
            echo "Updated $MANIFEST"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
