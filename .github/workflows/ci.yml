# Builds Docker images, pushes to ECR, and updates GitOps manifests.
#
# Push to main (app source only) -> builds ALL services
# Manual run -> pick "all" or ONE service from the dropdown
name: Boutique CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'projects/boutique-microservices/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      service:
        description: Service to build
        required: true
        default: all
        type: choice
        options:
          - all
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-all:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.service == 'all'
    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build and Push Docker Image
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG

          echo "Building $IMAGE_URI from $BUILD_PATH"
          docker build -t $IMAGE_URI $BUILD_PATH
          docker push $IMAGE_URI

  build-one:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.service != 'all'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build and Push Docker Image
        run: |
          SERVICE=${{ github.event.inputs.service }}

          if [ "$SERVICE" = "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/$SERVICE"
          fi

          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE:$IMAGE_TAG

          echo "Building $IMAGE_URI from $BUILD_PATH"
          docker build -t $IMAGE_URI $BUILD_PATH
          docker push $IMAGE_URI

  update-all-manifests:
    runs-on: ubuntu-latest
    needs: build-all
    if: github.event_name == 'push' || github.event.inputs.service == 'all'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update all image tags
        run: |
          NEW_TAG=${{ github.sha }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}

          for SERVICE in auth gateway orders order-service product-service user-service; do
            sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${NEW_TAG}|g" gitops/k8s/backend/${SERVICE}.yml
          done

          sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/frontend:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/frontend:${NEW_TAG}|g" gitops/k8s/frontend/deployment.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update all image tags to ${{ github.sha }}"
          git push

  update-one-manifest:
    runs-on: ubuntu-latest
    needs: build-one
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.service != 'all'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update image tag
        run: |
          NEW_TAG=${{ github.sha }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}
          SERVICE=${{ github.event.inputs.service }}

          if [ "$SERVICE" = "frontend" ]; then
            MANIFEST="gitops/k8s/frontend/deployment.yml"
          else
            MANIFEST="gitops/k8s/backend/${SERVICE}.yml"
          fi

          sed -i "s|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:.*|${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${NEW_TAG}|g" $MANIFEST

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update ${{ github.event.inputs.service }} image tag to ${{ github.sha }}"
          git push
