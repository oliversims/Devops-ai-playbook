# HTTPS Ingress for ArgoCD and monitoring (shared ALB).
# Boutique app: gitops/02_boutique-ingress
# Kira (AIOps): gitops/02_aiops
# Apply: kubectl apply -k gitops/01_ingress
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - argocd.yml
  - grafana.yml
  - prometheus.yml
configMapGenerator:
  - name: ingress-config
    envs:
      - ingress.env

generatorOptions:
  disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: ingress-config
      fieldPath: data.ACM_CERTIFICATE_ARN
    targets:
      - select:
          kind: Ingress
        fieldPaths:
          - metadata.annotations.[alb.ingress.kubernetes.io/certificate-arn]

  - source:
      kind: ConfigMap
      name: ingress-config
      fieldPath: data.ARGOCD_HOST
    targets:
      - select:
          kind: Ingress
          name: argocd
        fieldPaths:
          - spec.rules.0.host
          - metadata.annotations.[external-dns.alpha.kubernetes.io/hostname]

  - source:
      kind: ConfigMap
      name: ingress-config
      fieldPath: data.GRAFANA_HOST
    targets:
      - select:
          kind: Ingress
          name: grafana
        fieldPaths:
          - spec.rules.0.host
          - metadata.annotations.[external-dns.alpha.kubernetes.io/hostname]

  - source:
      kind: ConfigMap
      name: ingress-config
      fieldPath: data.PROMETHEUS_HOST
    targets:
      - select:
          kind: Ingress
          name: prometheus
        fieldPaths:
          - spec.rules.0.host
          - metadata.annotations.[external-dns.alpha.kubernetes.io/hostname]
