# -------------------------------------------------------
# SECRET: Store sensitive database credentials securely
# -------------------------------------------------------
# A Kubernetes Secret is used to store sensitive information
# like passwords, tokens, and connection strings.
# Unlike a ConfigMap, Secret values are base64-encoded by
# Kubernetes and can be restricted using RBAC policies.
# Pods reference these values without ever hardcoding them
# in the deployment manifests.
apiVersion: v1
kind: Secret
metadata:
  name: boutique-secrets  # This name is referenced in all the deployment manifests
                          # e.g., secretKeyRef: name: boutique-secrets
  namespace: boutique     # Must be in the same namespace as the pods that use it

# Opaque is the default Secret type — used for arbitrary key-value data.
# Other types exist for specific use cases (e.g., kubernetes.io/tls for TLS certs,
# kubernetes.io/dockerconfigjson for image pull secrets).
type: Opaque

# -------------------------------------------------------
# STRING DATA: The actual secret values in plain text
# -------------------------------------------------------
# "stringData" lets you write values in plain text here.
# Kubernetes automatically base64-encodes them when storing.
# (If you use "data:" instead, you must base64-encode manually)
# ⚠️ WARNING: Never commit this file to Git with real passwords.
# Use tools like Sealed Secrets, AWS Secrets Manager, or Vault instead.
stringData:
  POSTGRES_DB: postgres        # The default database name
  POSTGRES_USER: postgres      # The PostgreSQL superuser username
  POSTGRES_PASSWORD: postgres123  # ⚠️ Change this to a strong password in production

  # -------------------------------------------------------
  # DATABASE CONNECTION URLS: One per microservice
  # -------------------------------------------------------
  # Format: postgresql://<user>:<password>@<host>:<port>/<database>
  # <host> = "boutique-postgres" which is the name of the Headless Service
  # we created earlier — Kubernetes DNS resolves it to the PostgreSQL pod.

  AUTH_DB_URL: postgresql://postgres:postgres123@boutique-postgres:5432/auth_db
  # ^ Used by the Auth service to connect to its own isolated database

  PRODUCTS_DB_URL: postgresql://postgres:postgres123@boutique-postgres:5432/products_db
  # ^ Used by the Product service to connect to its own isolated database

  ORDERS_DB_URL: postgresql://postgres:postgres123@boutique-postgres:5432/orders_db
  # ^ Used by the Orders service to connect to its own isolated database

  USERS_DB_URL: postgresql://postgres:postgres123@boutique-postgres:5432/users_db
  # ^ Used by the User service to connect to its own isolated database