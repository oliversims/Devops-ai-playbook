apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 742934034265.dkr.ecr.us-east-1.amazonaws.com/frontend:dfc0523130f5dd135180bc3ce072e69b87179352
          ports:
            - containerPort: 3000
          # API URL is baked in at image build time (see frontend/Dockerfile). Not read at runtime.
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

